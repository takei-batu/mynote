      #   with:
      #     files: "**/*.typ"
      #     # diff_filter: "ACMRT"

      # - name: Typst_auto
        # if: github.event_name == 'push'
        # uses: lvignoli/typst-action@main
        # with:
        #   source_file: ${{ steps.typ_path.outputs.all_changed_files }}

      # - name: Upload PDF file
      #   if: github.event_name == 'push'
      #   uses: actions/upload-artifact@v6
      #   with:
      #     name: PDF
      #     path: "**/*.pdf"

      # - name: Typst_direct
      #   if: github.event_name == 'workflow_dispatch'
      #   uses: lvignoli/typst-action@main
      #   with:
      #     source_file: ${{ inputs.directory }}/${{ inputs.name }}.typ

      - name: Upload PDF file
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: PDF
          path: ${{ inputs.directory }}/${{ inputs.name }}.pdf

