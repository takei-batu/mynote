- name: URLの存在とアクセス確認
        env:
          WEBDAV_USER: ${{ secrets.INFINICLOUD_USER }}
          WEBDAV_PASS: ${{ secrets.INFINICLOUD_PASS }}
          WEBDAV_URL: ${{ secrets.INFINICLOUD_URL }}
        run: |
          echo "URLのフォーマットチェックと接続テストを開始します..."
          echo "対象URL: ${WEBDAV_URL}"

          # curlを使ってHTTPステータスコードだけを取得する
          # -s: 進捗を表示しない（サイレント）
          # -o /dev/null: ダウンロードした中身は捨てる
          # -w "%{http_code}": 最後にステータスコードを出力する
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "${WEBDAV_USER}:${WEBDAV_PASS}" "${WEBDAV_URL}")

          echo "HTTPステータスコード: ${STATUS_CODE}"

          # ステータスコードに応じた結果の判定
          case $STATUS_CODE in
            200|207)
              echo "✅ 成功: URLは存在し、アクセス可能です。"
              ;;
            401)
              echo "❌ 認証エラー: URLは存在しますが、ユーザー名かパスワードが間違っています。"
              exit 1
              ;;
            404)
              echo "❌ Not Found: サーバーはありますが、指定したディレクトリが存在しません。URLの末尾などを確認してください。"
              exit 1
              ;;
            000)
              echo "❌ 接続失敗: URLの形式がおかしいか、サーバーが存在しません。URLが https:// から始まっているか確認してください。"
              exit 1
              ;;
            *)
              echo "⚠️ 予期しないステータスコードです。設定を見直してください。"
              exit 1
              ;;
          esac