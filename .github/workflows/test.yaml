name: Test Zotero API Upload

# 手動実行のみで動かせるようにします
on: workflow_dispatch

jobs:
  test_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: pyzoteroのインストール
        run: pip install pyzotero

      - name: ダミーのPDFファイルを作成
        # 本当のPDFではなく、名前だけ output.pdf の空ファイルを作ってテストします
        run: echo "This is a test dummy PDF" > output.pdf

      - name: Zotero API経由でアップロードテスト
        env:
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        run: |
          echo "Zoteroへのアップロードを開始します..."
          python upload_to_zotero.py